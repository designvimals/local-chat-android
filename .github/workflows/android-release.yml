name: Android APK release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: android/**/*.gradle*

      - name: Validate release version
        shell: bash
        run: |
          version=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' android/app/build.gradle.kts)
          test "$GITHUB_REF_NAME" = "v$version" || {
            echo "Tag $GITHUB_REF_NAME does not match Android version v$version"
            exit 1
          }

      - name: Restore APK signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/between-release.keystore"

      - name: Build signed APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/between-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_pocBackendUrl: ${{ secrets.ANDROID_BACKEND_URL }}
          ORG_GRADLE_PROJECT_pocRegistrationKey: ${{ secrets.DEVICE_REGISTRATION_KEY }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Prepare release asset
        shell: bash
        run: cp android/app/build/outputs/apk/release/app-release.apk "Test-App-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release create "$GITHUB_REF_NAME" "Test-App-${GITHUB_REF_NAME}.apk" --title "Test App $GITHUB_REF_NAME" --generate-notes
